<header class="header">
  <div class="header__left">
    <button class="header__menu-btn" (click)="toggle()" title="Toggle sidebar">
      <span></span><span></span><span></span>
    </button>
    <div class="header__brand">
      <div>
        <p class="header__title">{{ titulo() }}</p>
        <p class="header__sub">{{ subtitulo() }}</p>
      </div>
    </div>
  </div>
  <div class="header__right">
    <span class="header__badge">EXPEDIENTE TÉCNICO LEGAL</span>
    <span class="header__badge header__badge--yellow">AF-JA</span>
  </div>
</header>
